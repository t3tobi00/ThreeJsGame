              stats: { HP: 'Low', Speed: 'Medium', Damage: 'Low', Role: 'Ambusher' } },
            { id: 'spitter', name: 'Spitter', tier: 3, swatch: '#88ff44',
              tag: 'Ranged acid caster', build: buildSpitter,
              desc: 'Tall, spindly. Rears back and spits acid. Crumples sideways on death.',
              stats: { HP: 'Medium', Speed: 'Slow', Damage: 'Ranged DoT', Role: 'Artillery' } }
        ];

        // =============================================================
        // State management
        // =============================================================
        const animState = {
            mode: 'walk',
            loopMode: 'walk',  // returns here after attack/hit
            attackT: 0,
            hitT: 0,
            dieT: 0,
            attackDur: 1.0,
            hitDur: 0.4,
            dieDur: 0.8
        };

        let currentZombie = null;
        let currentVariant = null;
        const villager = buildVillager();
        villager.position.set(1.3, 0, 0);
        scene.add(villager);

        function setLoopMode(mode) {
            animState.mode = mode;
            animState.loopMode = mode;
            animState.attackT = 0;
            animState.hitT = 0;
            animState.dieT = 0;
            updateButtons();
        }

        function triggerAttack() {
            if (animState.mode === 'die') return;
            animState.mode = 'attack';
            animState.attackT = 0;
            updateButtons();
        }

        function triggerHit() {
            if (animState.mode === 'die') return;
            animState.mode = 'hit';
            animState.hitT = 0;
            updateButtons();
        }

        function triggerDie() {
            animState.mode = 'die';
            animState.dieT = 0;
            updateButtons();
        }

        function revive() {
            animState.mode = animState.loopMode;
            animState.dieT = 0;
            updateButtons();
        }

        function updateButtons() {
            document.querySelectorAll('.loop-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === animState.mode);
            });
            document.getElementById('state-badge').textContent = animState.mode.toUpperCase();
        }

        function showVariant(variant) {
            if (currentZombie) scene.remove(currentZombie);
            currentZombie = variant.build();
            currentZombie.position.set(-1.3, 0, 0);
            scene.add(currentZombie);
            currentVariant = variant;
            animState.mode = animState.loopMode;
            animState.attackT = 0;
            animState.hitT = 0;
            animState.dieT = 0;

            const statsHtml = Object.entries(variant.stats)
                .map(([k, v]) => `<div><b>${k}</b></div><div>${v}</div>`).join('');
            document.getElementById('info').innerHTML = `
                <div class="i-name">${variant.name}</div>
                <div class="i-desc">${variant.desc}</div>
                <div class="i-stats">${statsHtml}</div>
            `;

            document.querySelectorAll('.z-entry').forEach(el => {
                el.classList.toggle('active', el.dataset.id === variant.id);
            });
            updateButtons();
        }

        // =============================================================
        // Sidebar UI
        // =============================================================
        const entriesEl = document.getElementById('entries');
        VARIANTS.forEach(v => {
            const el = document.createElement('div');
            el.className = 'z-entry';
            el.dataset.id = v.id;
            el.innerHTML = `
                <div class="z-swatch" style="background:${v.swatch}"></div>
                <div class="z-text">
                    <div class="z-name">${v.name} <span class="z-tier t${v.tier}">T${v.tier}</span></div>
                    <div class="z-tag">${v.tag}</div>
                </div>
            `;
            el.addEventListener('click', () => showVariant(v));
            entriesEl.appendChild(el);
        });

        document.querySelectorAll('.loop-btn').forEach(btn => {
            btn.addEventListener('click', () => setLoopMode(btn.dataset.mode));
        });
        document.getElementById('btn-attack').addEventListener('click', triggerAttack);
        document.getElementById('btn-hit').addEventListener('click', triggerHit);
        document.getElementById('btn-die').addEventListener('click', triggerDie);
        document.getElementById('btn-revive').addEventListener('click', revive);
        document.getElementById('show-villager').addEventListener('change', (e) => {
            villager.visible = e.target.checked;
        });

        showVariant(VARIANTS[0]);

        // =============================================================
        // Animation loop
        // =============================================================
        const clock = new THREE.Clock();
        let autoCooldown = 0;
        function animate() {
            const dt = Math.min(clock.getDelta(), 0.05);
            const t = clock.elapsedTime;

            // Progress one-shot states
            if (animState.mode === 'attack') {
                animState.attackT += dt / animState.attackDur;
                if (animState.attackT >= 1) {
                    animState.attackT = 0;
                    animState.mode = animState.loopMode;
                    updateButtons();
                }
            } else if (animState.mode === 'hit') {
                animState.hitT += dt / animState.hitDur;
                if (animState.hitT >= 1) {
                    animState.hitT = 0;
                    animState.mode = animState.loopMode;
                    updateButtons();
                }
            } else if (animState.mode === 'die') {
                animState.dieT = Math.min(animState.dieT + dt / animState.dieDur, 1);
            }

            // Auto-attack loop
            if (document.getElementById('auto-attack').checked) {
                const loopNow = ['idle', 'walk', 'run'].includes(animState.mode);
                if (loopNow) {
                    autoCooldown -= dt;
                    if (autoCooldown <= 0) {
                        triggerAttack();
                        autoCooldown = 1.5;
                    }
                }
            }

            if (currentZombie) {
                // Don't spin dead zombies — let user look at the corpse
                if (animState.mode !== 'die') currentZombie.rotation.y = t * 0.45;
                currentZombie.userData.animate?.(t, dt, animState);
            }
            villager.rotation.y = t * 0.45;
            villager.userData.animate?.(t, dt, animState);

            updateParticles(dt);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
