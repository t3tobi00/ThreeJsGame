<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weapon Lab — single sword</title>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%;
            background: #2a3a4a; overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            color: #eee;
            user-select: none;
        }

        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 260px;
            background: rgba(18, 22, 30, 0.94);
            box-shadow: 2px 0 12px rgba(0,0,0,0.4);
            overflow-y: auto;
            padding: 14px 0 20px 0;
            z-index: 10;
        }
        #sidebar h1 {
            margin: 0 16px 4px 16px;
            font-size: 15px; letter-spacing: 0.5px;
            color: #b8e0ff;
        }
        #sidebar .sub {
            margin: 0 16px 12px 16px;
            font-size: 10px; color: #889; line-height: 1.4;
        }

        .section-label {
            margin: 14px 16px 6px 16px;
            font-size: 10px; color: #7fb8ff;
            letter-spacing: 1.2px; font-weight: 700;
        }

        .slider-row {
            margin: 8px 16px;
            font-size: 10px; color: #aab;
        }
        .slider-row label {
            display: flex; justify-content: space-between;
            margin-bottom: 3px;
            font-weight: 600; letter-spacing: 0.3px;
        }
        .slider-row input[type=range] { width: 100%; accent-color: #7fb8ff; }
        .slider-row input[type=color] {
            width: 100%; height: 28px;
            border: 1px solid #2d3a4a;
            background: transparent;
            cursor: pointer;
        }
        .slider-row .val { color: #fff; }

        .btn {
            margin: 8px 16px 0 16px;
            background: #1e2a3a;
            color: #b8e0ff;
            border: 1px solid #2d3a4a;
            padding: 8px;
            border-radius: 5px;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.4px;
            cursor: pointer;
            width: calc(100% - 32px);
        }
        .btn:hover { background: #2a3a4a; }
        .btn.toggle.on {
            background: linear-gradient(180deg, #2d4a6a, #1f3a5a);
            border-color: #7fb8ff;
            color: #fff;
        }

        #hud {
            position: fixed; top: 12px; right: 16px;
            background: rgba(18, 22, 30, 0.85);
            border: 1px solid #2d3a4a;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 12px;
            z-index: 5;
            min-width: 150px;
            line-height: 1.6;
        }
        #hud .row { display: flex; justify-content: space-between; gap: 12px; }
        #hud .k { color: #889; }
        #hud .v { color: #fff; font-weight: 700; }
        #hud .finisher-flash {
            margin-top: 6px;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1.2px;
            font-size: 11px;
            background: #ff5522;
            color: #fff;
            opacity: 0;
            transition: opacity 0.4s;
        }
        #hud .finisher-flash.show {
            opacity: 1;
            transition: opacity 0.05s;
        }

        #hint {
            position: fixed; bottom: 12px; right: 16px;
            background: rgba(18, 22, 30, 0.7);
            padding: 6px 12px; border-radius: 4px;
            font-size: 10px; color: #889;
            z-index: 5;
        }

        /* Damage popup — DOM overlay projected to world position */
        .dmg-popup {
            position: fixed;
            font-weight: 900;
            font-size: 18px;
            color: #ffe066;
            text-shadow: 0 0 4px #000, 1px 1px 0 #000, -1px -1px 0 #000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 4;
        }
        .dmg-popup.crit {
            font-size: 26px;
            color: #ff7733;
            text-shadow: 0 0 6px #000, 1px 1px 0 #000, -1px -1px 0 #000;
        }

        canvas { display: block; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Weapon Lab</h1>
        <div class="sub">One sword, dancing around an anchor point. Click canvas or press Space to swing.</div>

        <div class="section-label">REACH</div>
        <div class="slider-row">
            <label>Normal reach <span class="val" id="v-normalreach">—</span></label>
            <input type="range" id="r-normalreach" min="50" max="200" step="5">
        </div>
        <div class="slider-row">
            <label>Finisher reach <span class="val" id="v-finisherreach">—</span></label>
            <input type="range" id="r-finisherreach" min="50" max="200" step="5">
        </div>

        <div class="section-label">SPEED</div>
        <div class="slider-row">
            <label>Slash speed <span class="val" id="v-slashspeed">—</span></label>
            <input type="range" id="r-slashspeed" min="30" max="200" step="5">
        </div>

        <div class="section-label">COMBO</div>
        <div class="slider-row">
            <label>Finisher <span class="val" id="v-finisher">—</span></label>
            <input type="range" id="r-finisher" min="0" max="8" step="1">
        </div>

        <div class="section-label">TRAIL</div>
        <div class="slider-row">
            <label>Normal color</label>
            <input type="color" id="r-trailcolor" value="#bbeeff">
        </div>
        <div class="slider-row">
            <label>Finisher color</label>
            <input type="color" id="r-finishercolor" value="#ff5522">
        </div>

        <div class="section-label">TARGET</div>
        <div class="slider-row">
            <label>Dummy distance <span class="val" id="v-dummy">—</span></label>
            <input type="range" id="r-dummy" min="0.8" max="3.0" step="0.1">
        </div>

        <div class="section-label">CONTROLS</div>
        <button class="btn toggle" id="b-auto">AUTO-SWING: OFF</button>
        <button class="btn" id="b-reset">RESET</button>
    </div>

    <div id="hud">
        <div class="row"><span class="k">Phase</span><span class="v" id="h-phase">IDLE</span></div>
        <div class="row"><span class="k">Combo</span><span class="v" id="h-combo">0</span></div>
        <div class="row"><span class="k">Hits</span><span class="v" id="h-hits">0</span></div>
        <div class="finisher-flash" id="h-finisher">FINISHER!</div>
    </div>

    <div id="hint">Click canvas · Space = swing</div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="./lab.js"></script>
</body>
</html>
