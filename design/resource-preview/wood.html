<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resource Preview — Wood</title>
<style>
  :root { --bg-0:#0b0f1a;--bg-1:#131a2b;--line:rgba(255,255,255,0.08);--txt:#e9eef7;--txt-dim:#8a94a8;--accent:#ffd24a;--accent-2:#4ad2ff; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:240px 1fr;height:100vh}
  aside{background:var(--bg-1);border-right:1px solid var(--line);padding:20px 0;overflow-y:auto}
  aside h2{margin:0 0 4px 20px;font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-dim)}
  aside p.hint{margin:0 20px 16px;font-size:11px;color:var(--txt-dim);line-height:1.4}
  .nav{list-style:none;padding:0;margin:0}
  .nav li{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;font-size:14px;font-weight:500}
  .nav li:hover{background:rgba(255,255,255,0.04)}
  .nav li.active{background:rgba(255,210,74,0.08);border-left-color:var(--accent);color:var(--accent)}
  .nav li .emoji{font-size:22px;line-height:1;width:28px;text-align:center}
  main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-0)}
  .topbar{padding:18px 28px 12px;border-bottom:1px solid var(--line)}
  .topbar h1{margin:0 0 4px;font-size:18px}
  .topbar p{margin:0;font-size:12px;color:var(--txt-dim)}
  .panels{display:grid;gap:16px;padding:20px 28px 28px;flex:1;min-height:0}
  .panel{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  .panel header{padding:14px 18px 8px;border-bottom:1px solid var(--line)}
  .panel header .ttl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .panel header .sub{font-size:11px;color:var(--txt-dim);margin-top:2px}
  .panel.new header .ttl{color:var(--accent)}
  .panel.alt header .ttl{color:var(--accent-2)}
  .stage{flex:1;position:relative;background:radial-gradient(ellipse at center top,#243152 0%,#0e1424 70%);cursor:grab}
  .stage:active{cursor:grabbing}
  .stage canvas{display:block;width:100%;height:100%}
  .stage .tip{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--txt-dim);pointer-events:none;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h2>Resources</h2>
    <p class="hint">Click to inspect. Drag to orbit, scroll to zoom.</p>
    <ul class="nav" id="nav">
      <li data-key="meat"><span class="emoji">🥩</span><span>Meat</span></li>
      <li data-key="coin"><span class="emoji">🪙</span><span>Coin</span></li>
      <li data-key="wood" class="active"><span class="emoji">🪵</span><span>Wood</span></li>
      <li data-key="stone"><span class="emoji">🪨</span><span>Stone</span></li>
      <li data-key="essence"><span class="emoji">🧪</span><span>Essence</span></li>
      <li data-key="essenceCandy"><span class="emoji">🍬</span><span>Essence Candy</span></li>
    </ul>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>
    <div class="panels" id="panels"></div>
  </main>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="_base.js"></script>
<script>
function buildWood() {
  var group = new THREE.Group();

  var bark = (function() {
    var { c, ctx } = makeCanvas(512);
    ctx.fillStyle = '#6b3e1c'; ctx.fillRect(0, 0, 512, 512);
    for (var i = 0; i < 60; i++) {
      var x = Math.random() * 512;
      ctx.strokeStyle = 'rgba(' + (30 + Math.random() * 30) + ', ' + (15 + Math.random() * 20) + ', 5, ' + (0.3 + Math.random() * 0.4) + ')';
      ctx.lineWidth = 1 + Math.random() * 3;
      ctx.beginPath(); ctx.moveTo(x, 0);
      ctx.bezierCurveTo(x + (Math.random() - 0.5) * 30, 170, x + (Math.random() - 0.5) * 30, 340, x + (Math.random() - 0.5) * 20, 512);
      ctx.stroke();
    }
    for (var i = 0; i < 30; i++) {
      var x = Math.random() * 512;
      ctx.strokeStyle = 'rgba(180, 130, 70, ' + (0.15 + Math.random() * 0.2) + ')';
      ctx.lineWidth = 1 + Math.random() * 2;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + (Math.random() - 0.5) * 20, 512); ctx.stroke();
    }
    for (var i = 0; i < 4; i++) {
      var x = Math.random() * 512, y = Math.random() * 512;
      var grd = ctx.createRadialGradient(x, y, 1, x, y, 18);
      grd.addColorStop(0, '#1a0d04'); grd.addColorStop(1, 'rgba(60,30,10,0)');
      ctx.fillStyle = grd; ctx.fillRect(x - 20, y - 20, 40, 40);
    }
    var t = texFromCanvas(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(2, 1);
    return t;
  })();

  var rings = (function() {
    var { c, ctx } = makeCanvas(512);
    ctx.fillStyle = '#c89060'; ctx.fillRect(0, 0, 512, 512);
    for (var i = 12; i > 0; i--) {
      ctx.beginPath(); ctx.arc(256, 256, i * 18 + Math.random() * 5, 0, Math.PI * 2);
      ctx.strokeStyle = i % 2 === 0 ? 'rgba(60, 30, 10, ' + (0.45 + Math.random() * 0.2) + ')' : 'rgba(150, 90, 40, ' + (0.3 + Math.random() * 0.2) + ')';
      ctx.lineWidth = 2 + Math.random() * 3; ctx.stroke();
    }
    for (var i = 0; i < 6; i++) {
      var a = Math.random() * Math.PI * 2;
      ctx.strokeStyle = 'rgba(40, 20, 5, 0.4)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(256, 256); ctx.lineTo(256 + Math.cos(a) * 230, 256 + Math.sin(a) * 230); ctx.stroke();
    }
    ctx.fillStyle = '#3a1f08'; ctx.beginPath(); ctx.arc(256, 256, 6, 0, Math.PI * 2); ctx.fill();
    return texFromCanvas(c);
  })();

  var r = 0.42, len = 1.6;
  var logGeo = new THREE.CylinderGeometry(r, r, len, 28, 1, false);
  var sideMat = new THREE.MeshStandardMaterial({ map: bark, roughness: 0.85 });
  var capMat = new THREE.MeshStandardMaterial({ map: rings, roughness: 0.7 });
  var logMesh = new THREE.Mesh(logGeo, [sideMat, capMat, capMat]);
  logMesh.rotation.z = Math.PI / 2;
  group.add(logMesh);
  return group;
}

initPreview({
  title: 'Wood',
  sub: 'Sculpted 3D log \u2014 bark sides with ring end caps.',
  panels: [{ mod: 'new', ttl: 'Sculpted 3D', sub: 'Cylindrical log with painted bark and growth-ring end caps', build: buildWood }]
});
</script>
</body>
</html>
