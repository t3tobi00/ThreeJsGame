<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resource Preview — Meat</title>
<style>
  :root { --bg-0:#0b0f1a;--bg-1:#131a2b;--line:rgba(255,255,255,0.08);--txt:#e9eef7;--txt-dim:#8a94a8;--accent:#ffd24a;--accent-2:#4ad2ff; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:240px 1fr;height:100vh}
  aside{background:var(--bg-1);border-right:1px solid var(--line);padding:20px 0;overflow-y:auto}
  aside h2{margin:0 0 4px 20px;font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-dim)}
  aside p.hint{margin:0 20px 16px;font-size:11px;color:var(--txt-dim);line-height:1.4}
  .nav{list-style:none;padding:0;margin:0}
  .nav li{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;font-size:14px;font-weight:500}
  .nav li:hover{background:rgba(255,255,255,0.04)}
  .nav li.active{background:rgba(255,210,74,0.08);border-left-color:var(--accent);color:var(--accent)}
  .nav li .emoji{font-size:22px;line-height:1;width:28px;text-align:center}
  main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-0)}
  .topbar{padding:18px 28px 12px;border-bottom:1px solid var(--line)}
  .topbar h1{margin:0 0 4px;font-size:18px}
  .topbar p{margin:0;font-size:12px;color:var(--txt-dim)}
  .panels{display:grid;gap:16px;padding:20px 28px 28px;flex:1;min-height:0}
  .panel{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  .panel header{padding:14px 18px 8px;border-bottom:1px solid var(--line)}
  .panel header .ttl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .panel header .sub{font-size:11px;color:var(--txt-dim);margin-top:2px}
  .panel.new header .ttl{color:var(--accent)}
  .panel.alt header .ttl{color:var(--accent-2)}
  .stage{flex:1;position:relative;background:radial-gradient(ellipse at center top,#243152 0%,#0e1424 70%);cursor:grab}
  .stage:active{cursor:grabbing}
  .stage canvas{display:block;width:100%;height:100%}
  .stage .tip{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--txt-dim);pointer-events:none;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h2>Resources</h2>
    <p class="hint">Click to inspect. Drag to orbit, scroll to zoom.</p>
    <ul class="nav" id="nav">
      <li data-key="meat" class="active"><span class="emoji">🥩</span><span>Meat</span></li>
      <li data-key="coin"><span class="emoji">🪙</span><span>Coin</span></li>
      <li data-key="wood"><span class="emoji">🪵</span><span>Wood</span></li>
      <li data-key="stone"><span class="emoji">🪨</span><span>Stone</span></li>
      <li data-key="essence"><span class="emoji">🧪</span><span>Essence</span></li>
      <li data-key="essenceCandy"><span class="emoji">🍬</span><span>Essence Candy</span></li>
    </ul>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>
    <div class="panels" id="panels"></div>
  </main>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="_base.js"></script>
<script>
// ----- Steak texture (top face) -----
function steakTopTexture() {
  const { c, ctx } = makeCanvas(512);
  ctx.clearRect(0, 0, 512, 512);
  const cx = 256, cy = 256;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx - 30, cy, 180, 130, 0, 0, Math.PI * 2);
  ctx.clip();
  const grd = ctx.createRadialGradient(cx - 50, cy - 30, 20, cx, cy, 220);
  grd.addColorStop(0, '#ec6f7a');
  grd.addColorStop(0.55, '#d04550');
  grd.addColorStop(1, '#a82a35');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 512, 512);
  ctx.strokeStyle = 'rgba(252, 232, 195, 0.7)';
  ctx.lineWidth = 7; ctx.lineCap = 'round';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    const y = 180 + i * 35;
    ctx.moveTo(110, y); ctx.bezierCurveTo(180, y - 18, 280, y + 18, 380, y); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(252, 232, 195, 0.85)';
  for (let i = 0; i < 22; i++) {
    const a = Math.random() * Math.PI * 2, r = Math.random() * 140;
    ctx.beginPath(); ctx.arc(cx - 30 + Math.cos(a) * r, cy + Math.sin(a) * r * 0.7, 2 + Math.random() * 2.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(cx - 70, cy - 60, 110, 30, -0.3, 0, Math.PI * 2); ctx.fill();
  return texFromCanvas(c);
}

function buildMeat() {
  const group = new THREE.Group();
  const shape = new THREE.Shape();
  const pts = [], N = 64;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    let rx = 0.95, ry = 0.7;
    const dent = Math.cos(a) < 0 ? Math.max(0, -Math.cos(a)) * 0.15 : 0;
    rx -= dent;
    const wob = 0.04 * Math.sin(a * 5);
    pts.push(new THREE.Vector2(Math.cos(a) * (rx + wob), Math.sin(a) * (ry + wob)));
  }
  shape.setFromPoints(pts);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.32, bevelEnabled: true, bevelSegments: 4, bevelSize: 0.08, bevelThickness: 0.06, curveSegments: 32, steps: 1 });
  geo.center(); geo.rotateX(-Math.PI / 2);
  const topMat = new THREE.MeshStandardMaterial({ map: steakTopTexture(), transparent: true, roughness: 0.55, metalness: 0.0 });
  const sideMat = new THREE.MeshStandardMaterial({ color: 0xf6e2a8, roughness: 0.7 });
  group.add(new THREE.Mesh(geo, [topMat, sideMat]));
  const boneMat = new THREE.MeshStandardMaterial({ color: 0xfff5e1, roughness: 0.45 });
  const bone = new THREE.Mesh(new THREE.CapsuleGeometry(0.11, 0.16, 6, 10), boneMat);
  bone.rotation.z = Math.PI / 2; bone.position.set(0.95, 0.04, 0);
  group.add(bone);
  const knob = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 10), boneMat);
  knob.position.set(1.13, 0.04, 0); knob.scale.set(1, 0.85, 1.1);
  group.add(knob);
  return group;
}

initPreview({
  title: 'Meat',
  sub: 'Sculpted 3D steak \u2014 kidney shape with bone, canvas-painted marbling.',
  panels: [{ mod: 'new', ttl: 'Sculpted 3D', sub: 'Hand-built steak shape with painted marbling texture and bone', build: buildMeat }]
});
</script>
</body>
</html>
