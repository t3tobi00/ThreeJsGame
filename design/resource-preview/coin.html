<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resource Preview — Coin</title>
<style>
  :root { --bg-0:#0b0f1a;--bg-1:#131a2b;--line:rgba(255,255,255,0.08);--txt:#e9eef7;--txt-dim:#8a94a8;--accent:#ffd24a;--accent-2:#4ad2ff; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:240px 1fr;height:100vh}
  aside{background:var(--bg-1);border-right:1px solid var(--line);padding:20px 0;overflow-y:auto}
  aside h2{margin:0 0 4px 20px;font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-dim)}
  aside p.hint{margin:0 20px 16px;font-size:11px;color:var(--txt-dim);line-height:1.4}
  .nav{list-style:none;padding:0;margin:0}
  .nav li{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;font-size:14px;font-weight:500}
  .nav li:hover{background:rgba(255,255,255,0.04)}
  .nav li.active{background:rgba(255,210,74,0.08);border-left-color:var(--accent);color:var(--accent)}
  .nav li .emoji{font-size:22px;line-height:1;width:28px;text-align:center}
  main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-0)}
  .topbar{padding:18px 28px 12px;border-bottom:1px solid var(--line)}
  .topbar h1{margin:0 0 4px;font-size:18px}
  .topbar p{margin:0;font-size:12px;color:var(--txt-dim)}
  .panels{display:grid;gap:16px;padding:20px 28px 28px;flex:1;min-height:0}
  .panel{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  .panel header{padding:14px 18px 8px;border-bottom:1px solid var(--line)}
  .panel header .ttl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .panel header .sub{font-size:11px;color:var(--txt-dim);margin-top:2px}
  .panel.new header .ttl{color:var(--accent)}
  .panel.alt header .ttl{color:var(--accent-2)}
  .stage{flex:1;position:relative;background:radial-gradient(ellipse at center top,#243152 0%,#0e1424 70%);cursor:grab}
  .stage:active{cursor:grabbing}
  .stage canvas{display:block;width:100%;height:100%}
  .stage .tip{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--txt-dim);pointer-events:none;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h2>Resources</h2>
    <p class="hint">Click to inspect. Drag to orbit, scroll to zoom.</p>
    <ul class="nav" id="nav">
      <li data-key="meat"><span class="emoji">🥩</span><span>Meat</span></li>
      <li data-key="coin" class="active"><span class="emoji">🪙</span><span>Coin</span></li>
      <li data-key="wood"><span class="emoji">🪵</span><span>Wood</span></li>
      <li data-key="stone"><span class="emoji">🪨</span><span>Stone</span></li>
      <li data-key="essence"><span class="emoji">🧪</span><span>Essence</span></li>
      <li data-key="essenceCandy"><span class="emoji">🍬</span><span>Essence Candy</span></li>
    </ul>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>
    <div class="panels" id="panels"></div>
  </main>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="_base.js"></script>
<script>
function buildCoin() {
  const group = new THREE.Group();

  const faceTex = (function() {
    const { c, ctx } = makeCanvas(1024);
    const cx = 512, cy = 512;
    const base = ctx.createRadialGradient(cx - 120, cy - 160, 60, cx, cy, 540);
    base.addColorStop(0, '#fbd884'); base.addColorStop(0.55, '#dba23a'); base.addColorStop(1, '#a26a18');
    ctx.fillStyle = base; ctx.beginPath(); ctx.arc(cx, cy, 500, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 14; ctx.strokeStyle = 'rgba(70, 40, 5, 0.55)';
    ctx.beginPath(); ctx.arc(cx, cy, 480, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255, 240, 180, 0.7)';
    ctx.beginPath(); ctx.arc(cx, cy, 462, 0, Math.PI * 2); ctx.stroke();

    var drawCurvedText = function(text, radius, centerAngle, fontPx, flip) {
      ctx.save(); ctx.fillStyle = '#5a3408';
      ctx.font = 'bold ' + fontPx + 'px "Trajan Pro", "Cinzel", "Times New Roman", serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var widths = [], total = 0;
      for (var k = 0; k < text.length; k++) { var w = ctx.measureText(text[k]).width; widths.push(w); total += w + 6; }
      var span = total / radius, a = centerAngle - span / 2;
      for (var k = 0; k < text.length; k++) {
        var ch = text[k], charSpan = (widths[k] + 6) / radius; a += charSpan / 2;
        ctx.save();
        ctx.translate(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
        if (flip) ctx.rotate(a - Math.PI / 2); else ctx.rotate(a + Math.PI / 2);
        ctx.fillStyle = 'rgba(255, 235, 170, 0.55)'; ctx.fillText(ch, 0, -1.5);
        ctx.fillStyle = '#5a3408'; ctx.fillText(ch, 0, 0);
        ctx.restore(); a += charSpan / 2;
      }
      ctx.restore();
    };
    drawCurvedText('UNITED STATES OF AMERICA', 410, -Math.PI / 2, 50, false);
    drawCurvedText('ONE DOLLAR', 410, Math.PI / 2, 56, true);

    var drawStar = function(x, y, r) {
      ctx.save(); ctx.translate(x, y); ctx.beginPath();
      for (var i = 0; i < 10; i++) { var ra = i % 2 === 0 ? r : r * 0.45; var aa = (i / 10) * Math.PI * 2 - Math.PI / 2; if (i === 0) ctx.moveTo(Math.cos(aa) * ra, Math.sin(aa) * ra); else ctx.lineTo(Math.cos(aa) * ra, Math.sin(aa) * ra); }
      ctx.closePath(); ctx.fillStyle = 'rgba(255, 235, 170, 0.6)'; ctx.fill();
      ctx.translate(0, 1.5); ctx.beginPath();
      for (var i = 0; i < 10; i++) { var ra = i % 2 === 0 ? r : r * 0.45; var aa = (i / 10) * Math.PI * 2 - Math.PI / 2; if (i === 0) ctx.moveTo(Math.cos(aa) * ra, Math.sin(aa) * ra); else ctx.lineTo(Math.cos(aa) * ra, Math.sin(aa) * ra); }
      ctx.closePath(); ctx.fillStyle = '#5a3408'; ctx.fill(); ctx.restore();
    };
    var starR = 350;
    var sideAngles = [-Math.PI*0.22,-Math.PI*0.10,-Math.PI*0.02,Math.PI*0.08,Math.PI*0.18,Math.PI*0.28,Math.PI-0.22,Math.PI-0.10,Math.PI-0.02,-Math.PI+0.08,-Math.PI+0.18,-Math.PI+0.28];
    for (var i = 0; i < sideAngles.length; i++) drawStar(cx + Math.cos(sideAngles[i]) * starR, cy + Math.sin(sideAngles[i]) * starR, 9);

    ctx.save(); ctx.translate(cx + 40, cy + 20);
    var drawEagle = function(offsetY, fillStyle) {
      ctx.save(); ctx.translate(0, offsetY); ctx.fillStyle = fillStyle;
      ctx.beginPath(); ctx.ellipse(0, 0, 50, 22, -0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-58, -12, 22, 16, -0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-78, -12); ctx.lineTo(-94, -8); ctx.lineTo(-78, -2); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-10, -10); ctx.bezierCurveTo(40, -130, 140, -200, 220, -150); ctx.bezierCurveTo(180, -120, 110, -60, 30, -10); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-10, 10); ctx.bezierCurveTo(30, 110, 130, 140, 200, 110); ctx.bezierCurveTo(150, 80, 80, 30, 20, 12); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(40, -5); ctx.lineTo(95, -25); ctx.lineTo(105, 0); ctx.lineTo(95, 25); ctx.closePath(); ctx.fill();
      ctx.restore();
    };
    drawEagle(-2, 'rgba(255, 235, 170, 0.75)'); drawEagle(0, '#6a3e0a');
    ctx.strokeStyle = 'rgba(255, 235, 170, 0.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    for (var i = 0; i < 8; i++) { var t = i / 7; ctx.beginPath(); ctx.moveTo(t*30, -10-t*30); ctx.lineTo(40+t*130, -120-t*30); ctx.stroke(); ctx.beginPath(); ctx.moveTo(t*25, 10+t*20); ctx.lineTo(30+t*120, 80+t*20); ctx.stroke(); }
    ctx.restore();
    ctx.fillStyle = '#5a3408'; ctx.font = 'bold 30px "Trajan Pro", "Times New Roman", serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('E', cx - 200, cy - 80);
    ctx.font = 'bold 26px "Trajan Pro", "Times New Roman", serif';
    ctx.fillText('PLURIBUS', cx - 200, cy - 40); ctx.fillText('UNUM', cx - 200, cy);
    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, 478, 0, Math.PI * 2); ctx.clip();
    var hl = ctx.createRadialGradient(cx - 200, cy - 220, 30, cx - 200, cy - 220, 360);
    hl.addColorStop(0, 'rgba(255, 250, 220, 0.45)'); hl.addColorStop(1, 'rgba(255, 250, 220, 0)');
    ctx.fillStyle = hl; ctx.fillRect(0, 0, 1024, 1024); ctx.restore();
    return texFromCanvas(c);
  })();

  var r = 0.78, h = 0.16;
  var bodyGeo = new THREE.CylinderGeometry(r, r, h, 64);
  var bodySideMat = new THREE.MeshStandardMaterial({ color: 0xc88a28, metalness: 0.95, roughness: 0.32 });
  var faceMat = new THREE.MeshStandardMaterial({ map: faceTex, metalness: 0.9, roughness: 0.32 });
  group.add(new THREE.Mesh(bodyGeo, [bodySideMat, faceMat, faceMat]));
  var rim = new THREE.Mesh(new THREE.TorusGeometry(r, h * 0.5, 12, 80), new THREE.MeshStandardMaterial({ color: 0xe8b04a, metalness: 1.0, roughness: 0.25 }));
  rim.rotation.x = Math.PI / 2;
  group.add(rim);
  return group;
}

initPreview({
  title: 'Coin',
  sub: 'Sculpted 3D dollar coin \u2014 brassy gold with eagle, curved text, stars.',
  panels: [{ mod: 'new', ttl: 'Sculpted 3D', sub: 'Sacagawea-style dollar coin with eagle and engraved text', build: buildCoin }]
});
</script>
</body>
</html>
