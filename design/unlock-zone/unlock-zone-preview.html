<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Unlock Zone — Variant Workbench</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────────────────────
     Unlock Zone Variant Workbench
     ─────────────────────────────────────────────────────────────
     Three-pane interactive prototype:
       · LEFT  — variant picker (click to switch)
       · MID   — selected variant rendered live
       · RIGHT — settings: inputs, output, speeds, progress, LED, play/pause

     All palette + chrome values pulled from styles/main.css so the
     card belongs to the existing HUD family. Animation timings are
     CSS custom properties so the sliders update them without a
     re-render.
     ───────────────────────────────────────────────────────────── */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: white;
  }
  body {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: 100vh;
  }

  /* ── Sidebars ──────────────────────────────────────────────── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    padding: 24px 18px;
    background: #161616;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar.left  { border-right: 1px solid #2a2a2a; }
  .sidebar.right { width: 300px; border-left: 1px solid #2a2a2a; }

  .sidebar h2 {
    font-size: 10px;
    font-weight: 800;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* Variant picker buttons */
  .variant-btn {
    background: #222;
    border: 1px solid #333;
    border-radius: 10px;
    color: #ccc;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .variant-btn:hover {
    background: #2a2a2a;
    border-color: #444;
    color: white;
  }
  .variant-btn.active {
    background: linear-gradient(180deg, #555 0%, #2c2c2c 100%);
    border-color: #888;
    color: white;
    box-shadow:
      0 4px 0 rgba(0, 0, 0, 0.6),
      inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }
  .variant-btn .sub {
    font-size: 10px;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── Middle: preview pane ──────────────────────────────────── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    gap: 14px;
    background: radial-gradient(ellipse at center, #1f1f1f 0%, #141414 100%);
  }
  .stage .label {
    font-size: 11px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── Settings form ─────────────────────────────────────────── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field > label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .field > label .val {
    color: #ddd;
    font-weight: 800;
    text-transform: none;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #dd1111;
  }
  input[type="text"], input[type="number"], select {
    background: #222;
    border: 1px solid #333;
    border-radius: 6px;
    color: white;
    padding: 6px 8px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    width: 100%;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: #666;
  }

  .input-row, .output-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .input-row .e-in { width: 50px; text-align: center; font-size: 18px; }
  .input-row .n-in { width: 60px; }
  .input-row .del {
    background: #2a1414;
    border: 1px solid #4a1d1d;
    color: #ff8888;
    border-radius: 6px;
    width: 26px;
    height: 28px;
    cursor: pointer;
    font: inherit;
    font-weight: 900;
    line-height: 1;
    flex-shrink: 0;
  }
  .input-row .del:hover { background: #3a1818; }
  .add-btn {
    background: #1c2a1c;
    border: 1px dashed #3a5a3a;
    color: #88dd88;
    border-radius: 6px;
    padding: 6px 8px;
    font: inherit;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
  }
  .add-btn:hover { background: #233a23; }

  .output-row .e-out { width: 60px; text-align: center; font-size: 18px; }
  .output-row .n-out { width: 70px; }

  .toggle-row {
    display: flex;
    gap: 8px;
  }
  .toggle-row button {
    flex: 1;
    background: #222;
    border: 1px solid #333;
    color: #aaa;
    border-radius: 6px;
    padding: 8px;
    font: inherit;
    font-weight: 800;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .toggle-row button.active {
    background: #2a3a2a;
    border-color: #5a8a5a;
    color: #aaffaa;
  }

  /* ═════════════════════════════════════════════════════════════
     CARD STYLES — copied verbatim from the Phase D baseline so the
     baseline + gearworks variants render exactly as approved.
     CSS variables make the animation rates settings-driven.
     ═════════════════════════════════════════════════════════════ */

  .factory {
    --gear-period: 1.6s;
    --led-period: 1.4s;
    --bob-period: 2.4s;
    --tick-period: 2.4s;
    --bar-period: 2s;
    --flow-period: 2s;

    display: inline-flex;
    flex-direction: column;
    background: linear-gradient(180deg, #555 0%, #222 100%);
    border: 3px solid #777;
    border-radius: 22px;
    box-shadow:
      0 8px 0 rgba(0, 0, 0, 0.8),
      0 12px 15px rgba(0, 0, 0, 0.5),
      inset 0 2px 0 rgba(255, 255, 255, 0.12);
    padding: 18px 16px 14px;
    position: relative;
  }
  .factory.paused *,
  .factory.paused {
    animation-play-state: paused !important;
  }

  /* Rivets */
  .factory::before, .factory::after,
  .factory > .rv-l, .factory > .rv-r {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ddd 0%, #888 55%, #333 100%);
    box-shadow:
      inset 0 -1px 1px rgba(0, 0, 0, 0.6),
      0 1px 1px rgba(0, 0, 0, 0.6);
    pointer-events: none;
  }
  .factory::before { top: 8px; left: 10px; }
  .factory::after  { top: 8px; right: 10px; }
  .factory .rv-l   { bottom: 8px; left: 10px; }
  .factory .rv-r   { bottom: 8px; right: 10px; }

  /* Status LED */
  .led {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    box-shadow: inset 0 -1px 1px rgba(0, 0, 0, 0.4);
    animation: led-breathe var(--led-period) ease-in-out infinite;
  }
  .factory[data-led="idle"] .led {
    background: radial-gradient(circle at 35% 35%, #ddd 0%, #888 50%, #333 100%);
  }
  .factory[data-led="draining"] .led {
    background: radial-gradient(circle at 35% 35%, #fff7c2 0%, #ffd53d 50%, #b48400 100%);
  }
  .factory[data-led="done"] .led {
    background: radial-gradient(circle at 35% 35%, #c8ffe0 0%, #00ff88 50%, #008844 100%);
  }
  @keyframes led-breathe {
    0%, 100% { filter: brightness(0.85); }
    50%      { filter: brightness(1.20); }
  }

  /* Stations row */
  .stations {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 4px;
    position: relative;
  }
  .pod {
    background: rgba(0, 0, 0, 0.40);
    border: 2px solid rgba(255, 255, 255, 0.10);
    border-radius: 12px;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pod.input {
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px;
    min-width: 56px;
  }
  .pod.proc {
    width: 46px;
    min-height: 46px;
    align-self: center;
    position: relative;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.45);
  }
  .pod.proc::before {
    content: "";
    position: absolute;
    inset: -8px 0 -8px 0;
    background: repeating-linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.05) 0px,
      rgba(255, 255, 255, 0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    animation: scan-drift 1.6s linear infinite;
    pointer-events: none;
  }
  @keyframes scan-drift {
    from { transform: translateY(0); }
    to   { transform: translateY(3px); }
  }
  .pod.output {
    width: 64px;
    min-height: 64px;
    align-self: center;
    padding: 8px;
  }

  .joint {
    align-self: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #cfcfcf 0%, #6a6a6a 60%, #2b2b2b 100%);
    box-shadow:
      0 1px 1px rgba(0, 0, 0, 0.6),
      inset 0 -1px 1px rgba(0, 0, 0, 0.5);
    position: relative;
    flex-shrink: 0;
  }
  .joint::after {
    content: "";
    position: absolute;
    inset: 5px 2px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 1px;
  }

  /* Input rows */
  .row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    line-height: 1;
  }
  .row .e {
    font-size: 22px;
    font-family: "Segoe UI Emoji", "Apple Color Emoji",
                 "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    line-height: 1;
    display: inline-block;
    animation: input-tick var(--tick-period) ease-in-out infinite;
  }
  .row .n {
    font-size: 20px;
    font-weight: 900;
    color: white;
    text-shadow: 1px 2px 3px rgba(0, 0, 0, 0.6);
    letter-spacing: -0.02em;
    min-width: 18px;
  }
  @keyframes input-tick {
    0%, 70%, 100% { transform: scale(1);    }
    80%           { transform: scale(1.35); }
    90%           { transform: scale(0.92); }
  }
  .pod.input .row:nth-child(2) .e { animation-delay: calc(var(--tick-period) * 0.06); }
  .pod.input .row:nth-child(3) .e { animation-delay: calc(var(--tick-period) * 0.12); }

  /* Single-glyph gear (baseline variant) */
  .gear {
    font-size: 28px;
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 1px 2px 3px rgba(0, 0, 0, 0.6);
    line-height: 1;
    z-index: 1;
    display: inline-block;
    transform-origin: 50% 55%;
    animation: gear-spin var(--gear-period) linear infinite;
  }
  @keyframes gear-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Output emoji */
  .out {
    font-size: 40px;
    line-height: 1;
    font-family: "Segoe UI Emoji", "Apple Color Emoji",
                 "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.6));
    display: inline-block;
    animation: out-bob var(--bob-period) ease-in-out infinite;
  }
  @keyframes out-bob {
    0%, 100% { transform: translateY(0)    scale(1);    }
    50%      { transform: translateY(-5px) scale(1.10); }
  }

  /* Progress bar */
  .bar {
    margin-top: 12px;
    height: 8px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.7);
  }
  .bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(180deg, #ff6b6b 0%, #dd1111 100%);
    border-radius: 999px;
    position: relative;
    overflow: hidden;
    transition: width 0.25s ease-out;
  }
  .bar > span::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.55) 50%,
      transparent 100%
    );
    transform: translateX(-100%);
    animation: bar-sheen var(--bar-period) linear infinite;
  }
  @keyframes bar-sheen {
    0%   { transform: translateX(-100%); }
    60%  { transform: translateX(100%);  }
    100% { transform: translateX(100%);  }
  }

  /* ── Variant: gearworks ────────────────────────────────────── */
  /* Width/height are driven by CSS vars set inline on the card so the
     proc pod auto-grows when the gear count or gear size changes. */
  .factory.gearworks .pod.proc {
    width: var(--proc-w, 116px);
    min-height: var(--proc-h, 60px);
    padding: 4px;
  }
  .factory.gearworks .pod.proc .gear { display: none; }
  .factory.gearworks .pod.proc::before { opacity: 0.5; }

  .factory.gearworks .gears {
    position: relative;
    z-index: 2;
    width: 100%;
    height: var(--proc-h-inner, 56px);
    display: block;
    overflow: visible;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
  }
  .factory.gearworks .gears .disk { fill: #4a4a4a; stroke: #6f6f6f; stroke-width: 1; }
  .factory.gearworks .gears .tooth { fill: #888; }
  .factory.gearworks .gears .hub { fill: #1a1a1a; }
  .factory.gearworks .gears .g-big .rot {
    transform-box: fill-box;
    transform-origin: center center;
    animation: gear-spin calc(var(--gear-period) * 1.25) linear infinite;
  }
  .factory.gearworks .gears .g-small .rot {
    transform-box: fill-box;
    transform-origin: center center;
    animation: gear-spin var(--gear-period) linear infinite reverse;
  }

  .factory.gearworks .flow-channel {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .factory.gearworks .particle {
    position: absolute;
    top: 50%;
    font-size: 14px;
    line-height: 1;
    font-family: "Segoe UI Emoji", "Apple Color Emoji",
                 "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.7));
    opacity: 0;
    transform: translate(-50%, -50%);
    will-change: left, opacity, transform;
  }
  .factory.gearworks .particle.p-in {
    animation: flow-in var(--flow-period) linear infinite;
    animation-delay: var(--delay, 0s);
  }
  .factory.gearworks .particle.p-out {
    animation: flow-out var(--flow-period) linear infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes flow-in {
    0%   { left: 28%;  opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    12%  {             opacity: 1; }
    55%  { left: 42%;  opacity: 1; transform: translate(-50%, -50%) scale(1);   }
    72%  { left: 50%;  opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    100% { left: 50%;  opacity: 0; }
  }
  @keyframes flow-out {
    0%, 45% { left: 60%; opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    55%     { left: 64%; opacity: 1; transform: translate(-50%, -50%) scale(1);   }
    88%     { left: 78%; opacity: 1; transform: translate(-50%, -50%) scale(1);   }
    100%    { left: 80%; opacity: 0; }
  }

  /* Hide the progress bar in pads variant — proc pod ring + pods are the UI */
  .factory.pads > .bar { display: none; }

  /* ── Variant: pads (interactive recipe machine) ────────────────
     The existing input pod IS the receiving zone (click-to-feed via
     the drop tool). The existing output pod IS the output zone — it
     hosts the stack column where real outputs accumulate. Recipe
     numbers in the input pod show REMAINING needed. When all reach
     zero, the machine processes for `processTime` seconds and pops
     a fresh output onto the stack.
     ───────────────────────────────────────────────────────────── */

  /* Input pod is a click target. Dimmed by default (label only) and
     brightens up while the player is mid-feed (machineState="filling")
     so the live count-down is clearly visible. */
  .factory.pads .pod.input {
    cursor: pointer;
    opacity: 0.38;
    transition: opacity 0.25s ease-out, transform 0.1s ease-out, box-shadow 0.15s ease-out;
  }
  .factory.pads[data-machine-state="filling"] .pod.input {
    opacity: 1;
  }
  .factory.pads .pod.input:hover {
    box-shadow:
      inset 0 2px 4px rgba(0, 0, 0, 0.6),
      0 0 0 2px rgba(255, 213, 61, 0.6),
      0 0 12px rgba(255, 213, 61, 0.35);
  }
  .factory.pads .pod.input:active { transform: scale(0.96); }
  .factory.pads .pod.input.feed-flash {
    animation: feed-flash 0.4s ease-out;
  }
  @keyframes feed-flash {
    0%   { box-shadow: inset 0 2px 4px rgba(0,0,0,0.6),
                       0 0 0 3px rgba(120, 255, 140, 0.95),
                       0 0 18px rgba(120, 255, 140, 0.6); }
    100% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); }
  }
  /* Satisfied ingredient row — green tint when remaining hits 0 */
  .factory.pads .pod.input .row.satisfied { opacity: 0.55; }
  .factory.pads .pod.input .row.satisfied .n { color: #88ffaa; }

  /* Output pod widens to hold a vertical stack column. The placeholder
     glyph is always dim (it's just a label) — real stacked outputs
     appear on top at full brightness. */
  .factory.pads .pod.output {
    width: 78px;
    min-height: 78px;
    position: relative;
    overflow: visible;
  }
  .factory.pads .pod.output > .out {
    opacity: 0.32;
    filter: grayscale(0.55);
    transition: opacity 0.25s ease-out, filter 0.25s ease-out;
  }
  /* Slightly dimmer when real outputs are stacked above (visual hierarchy) */
  .factory.pads .pod.output.has-stack > .out {
    opacity: 0.16;
  }

  /* Output stack column (mimics in-game ResourceStack settle) */
  .factory.pads .pod.output .out-stack {
    position: absolute;
    left: 50%;
    bottom: 8px;
    width: 0;
    height: 0;
    pointer-events: none;
  }
  .factory.pads .pod.output .stack-item {
    position: absolute;
    left: 0;
    bottom: 0;
    font-size: 28px;
    line-height: 1;
    font-family: "Segoe UI Emoji", "Apple Color Emoji",
                 "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.7));
    transform: translate(-50%, calc(var(--idx) * -15px));
    transition: transform 0.35s cubic-bezier(0.2, 1.2, 0.4, 1);
    animation: out-stack-sway 2.2s ease-in-out infinite;
    animation-delay: calc(var(--idx) * -0.18s);
    transform-origin: 50% 100%;
  }
  @keyframes out-stack-sway {
    0%, 100% { transform: translate(-50%, calc(var(--idx) * -15px)) rotate(-1.5deg); }
    50%      { transform: translate(-50%, calc(var(--idx) * -15px)) rotate( 1.5deg); }
  }
  /* Pop-in flash for the most recently added output */
  .factory.pads .pod.output .stack-item.fresh {
    animation: out-stack-sway 2.2s ease-in-out infinite,
               output-pop 0.5s ease-out;
  }
  @keyframes output-pop {
    0%   { transform: translate(-50%, calc(var(--idx) * -15px - 22px)) scale(0.3); opacity: 0; }
    55%  { transform: translate(-50%, calc(var(--idx) * -15px + 6px))  scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, calc(var(--idx) * -15px))        scale(1);   opacity: 1; }
  }

  /* Processing progress ring overlay on the proc pod */
  .factory.pads .pod.proc .proc-progress {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;
    background: conic-gradient(
      from -90deg,
      rgba(120, 255, 140, 0.65) 0%,
      rgba(120, 255, 140, 0.65) calc(var(--proc, 0) * 100%),
      rgba(255, 255, 255, 0.06) calc(var(--proc, 0) * 100%),
      rgba(255, 255, 255, 0.06) 100%
    );
    -webkit-mask: radial-gradient(circle at center, transparent 60%, #000 62%, #000 72%, transparent 74%);
            mask: radial-gradient(circle at center, transparent 60%, #000 62%, #000 72%, transparent 74%);
    opacity: 0;
    transition: opacity 0.2s ease-out;
    z-index: 5;
  }
  .factory.pads[data-machine-state="processing"] .pod.proc .proc-progress {
    opacity: 1;
  }

  /* ── Machine on/off behavior ─────────────────────────────────
     The machine ONLY runs (gears spinning, flow particles flying,
     LED breathing) while it's actually crafting. When idle/filling
     it sits still — controlled by the `data-off-mode` toggle so
     you can compare two looks: completely frozen vs quiet idle hum.
     ───────────────────────────────────────────────────────────── */

  /* Flow particles only exist while processing — hidden otherwise */
  .factory.pads:not([data-machine-state="processing"]) .flow-channel {
    display: none;
  }

  /* Off mode: FROZEN — gears stopped, scan-lines paused, LED dark */
  .factory.pads[data-off-mode="frozen"]:not([data-machine-state="processing"]) .gears .rot,
  .factory.pads[data-off-mode="frozen"]:not([data-machine-state="processing"]) .pod.proc .gear {
    animation-play-state: paused;
    opacity: 0.42;
  }
  .factory.pads[data-off-mode="frozen"]:not([data-machine-state="processing"]) .pod.proc::before {
    animation-play-state: paused;
    opacity: 0.15;
  }
  .factory.pads[data-off-mode="frozen"]:not([data-machine-state="processing"]) .led {
    animation: none;
    filter: brightness(0.35);
  }

  /* Off mode: HUM — gears creep slowly, LED breathes faintly */
  .factory.pads[data-off-mode="hum"]:not([data-machine-state="processing"]) .gears .rot,
  .factory.pads[data-off-mode="hum"]:not([data-machine-state="processing"]) .pod.proc .gear {
    animation-duration: calc(var(--gear-period) * 6) !important;
    opacity: 0.65;
  }
  .factory.pads[data-off-mode="hum"]:not([data-machine-state="processing"]) .pod.proc::before {
    opacity: 0.35;
  }
  .factory.pads[data-off-mode="hum"]:not([data-machine-state="processing"]) .led {
    filter: brightness(0.55);
  }
  /* While processing — defaults take over (full speed gears, particles, LED) */

</style>
</head>
<body>

<script>
// ─────────────────────────────────────────────────────────────────
// Workbench state + render
// ─────────────────────────────────────────────────────────────────

const state = {
  variant: 'gearworks',         // 'baseline' | 'gearworks' | 'pads'
  inputs: [
    { emoji: '🥩', count: 5 },
    { emoji: '🪵', count: 2 },
  ],
  output: { emoji: '🍔', count: 1 },
  progress: 70,
  gearPeriod: 1.6,              // seconds
  flowPeriod: 2.0,
  gearCount: 2,                 // 1 | 2 | 3 — gears in the proc pod row
  gearSize: 1.0,                // multiplier on the base gear radii (0.6–1.8)
  led: 'draining',              // 'idle' | 'draining' | 'done'
  paused: false,

  // ── pads variant: live recipe machine ───────────────────────
  machineState: 'idle',         // 'idle' | 'filling' | 'processing'
  fed: [0, 0],                  // running deposit per input index
  processTime: 3.0,             // seconds per craft
  processProgress: 0,           // 0..1 while machineState === 'processing'
  outputStack: [],              // array of {fresh:bool} per finished output
  freshKey: 0,                  // monotonically increasing id for pop animations
  dropTool: { itemIdx: 0, amount: 1 },
  offMode: 'frozen',            // 'frozen' | 'hum' — look while not processing
};

// Keep `state.fed` length in sync with the recipe and clamp dropTool index.
function syncFed() {
  while (state.fed.length < state.inputs.length) state.fed.push(0);
  state.fed.length = state.inputs.length;
  if (state.dropTool.itemIdx >= state.inputs.length) {
    state.dropTool.itemIdx = Math.max(0, state.inputs.length - 1);
  }
}

// Compute the next machine state from fed[] and processing flag.
function deriveMachineState() {
  if (state.machineState === 'processing') return 'processing';
  const anyFed = state.fed.some(n => n > 0);
  return anyFed ? 'filling' : 'idle';
}

// ── Gear cluster: dynamic count + size ───────────────────────
// Base templates (per-gear) at gearSize === 1.0. The first three
// entries cover counts 1, 2, 3 — appended in order. Each entry
// describes one disk in viewBox units before the size multiplier
// is applied.
const GEAR_TEMPLATES = [
  // Index 0 — big lead gear
  { r: 13, teethCount: 8, toothLen: 6, toothW: 6,   hub: 3, alt: 'big'   },
  // Index 1 — small partner
  { r:  9, teethCount: 6, toothLen: 5, toothW: 5,   hub: 2, alt: 'small' },
  // Index 2 — third trailing gear (bigger than the middle one so the
  // 3-gear row reads as big → small → medium-big and feels balanced)
  { r: 11, teethCount: 8, toothLen: 5, toothW: 5,   hub: 3, alt: 'big'   },
];

// Compute the layout for the current gearCount + gearSize. Returns
// per-gear positions in viewBox units plus the overall viewBox size.
// All gears sit on the horizontal centreline; centres are placed so
// each pair just touches (radius + radius), giving the meshing look.
function computeGearLayout() {
  const count = Math.max(1, Math.min(3, state.gearCount | 0));
  const s = state.gearSize;
  const padX = 4;          // horizontal padding inside the viewBox
  const padY = 4;          // vertical padding inside the viewBox
  const gears = [];

  // Scaled per-gear data
  const scaled = GEAR_TEMPLATES.slice(0, count).map(t => ({
    r:        t.r * s,
    toothLen: t.toothLen * s,
    toothW:   t.toothW * s,
    hub:      t.hub * s,
    teethCount: t.teethCount,
    alt:      t.alt,
  }));

  // Place centres left-to-right; first centre = padX + r0 + toothLen0
  // so the outermost tooth tips clear the edge. Each subsequent gear
  // sits exactly one diameter-pair away.
  let cx = padX + scaled[0].r + scaled[0].toothLen;
  for (let i = 0; i < scaled.length; i++) {
    if (i > 0) {
      cx += scaled[i - 1].r + scaled[i].r;
    }
    gears.push({ ...scaled[i], cx });
  }

  // viewBox dimensions: width spans all gears + padding; height fits
  // the tallest gear (radius + tooth length) on either side of centre.
  const last = gears[gears.length - 1];
  const viewBoxW = last.cx + last.r + last.toothLen + padX;
  const maxOuter = Math.max(...gears.map(g => g.r + g.toothLen));
  const viewBoxH = maxOuter * 2 + padY * 2;
  const cy = viewBoxH / 2;

  return { gears, viewBoxW, viewBoxH, cy };
}

// Build the SVG gear cluster used by the gearworks variant. The
// number of gears and their size are driven by `state.gearCount`
// and `state.gearSize` via computeGearLayout().
function gearClusterSVG() {
  const layout = computeGearLayout();
  const { viewBoxW, viewBoxH, cy } = layout;
  const gearsSVG = layout.gears.map((g, i) => {
    // Tooth rectangles: evenly spaced around the disk; y position
    // pushes them just outside the radius so they read as teeth.
    const toothY = -(g.r + g.toothLen);
    const teeth = Array.from({ length: g.teethCount }, (_, t) => {
      const a = (360 / g.teethCount) * t;
      return `<rect class="tooth" x="${(-g.toothW/2).toFixed(2)}" y="${toothY.toFixed(2)}" width="${g.toothW.toFixed(2)}" height="${g.toothLen.toFixed(2)}" transform="rotate(${a})"/>`;
    }).join('');
    // Alternate spin direction (alt class controls CSS animation
    // direction + period). Index 0 + 2 = 'big' (slow forward),
    // index 1 = 'small' (fast reverse).
    const cls = g.alt === 'big' ? 'g-big' : 'g-small';
    return `
      <g class="${cls}" transform="translate(${g.cx.toFixed(2)},${cy.toFixed(2)})">
        <g class="rot">
          <circle class="disk" r="${g.r.toFixed(2)}"/>
          ${teeth}
          <circle class="hub" r="${g.hub.toFixed(2)}"/>
        </g>
      </g>`;
  }).join('');

  return `
    <svg class="gears" viewBox="0 0 ${viewBoxW.toFixed(2)} ${viewBoxH.toFixed(2)}" preserveAspectRatio="xMidYMid meet">
      ${gearsSVG}
    </svg>`;
}

// Build the flow particles for the gearworks variant
function flowChannelHTML() {
  const inParts = state.inputs.map((inp, i) =>
    `<span class="particle p-in" style="--delay: ${(i * 0.5).toFixed(2)}s">${inp.emoji}</span>`
  ).join('');
  const outEmoji = state.output.emoji || '?';
  const outParts = [0.25, 1.25].map(d =>
    `<span class="particle p-out" style="--delay: ${d}s">${outEmoji}</span>`
  ).join('');
  return `<div class="flow-channel">${inParts}${outParts}</div>`;
}

function renderCard() {
  // Pads variant inherits the gearworks machine visuals
  const useGears = state.variant === 'gearworks' || state.variant === 'pads';
  const isPads   = state.variant === 'pads';

  // Input rows: pads variant shows REMAINING needed (recipe.count - fed[i])
  const inputRowsHTML = state.inputs.map((inp, i) => {
    if (isPads) {
      const remaining = Math.max(0, inp.count - (state.fed[i] || 0));
      const cls = remaining === 0 ? 'row satisfied' : 'row';
      return `<div class="${cls}"><span class="e">${inp.emoji}</span><span class="n">${remaining}</span></div>`;
    }
    return `<div class="row"><span class="e">${inp.emoji}</span><span class="n">${inp.count}</span></div>`;
  }).join('');

  const procExtra = isPads
    ? `<div class="proc-progress" style="--proc:${state.processProgress.toFixed(3)}"></div>`
    : '';

  const procHTML = useGears
    ? `<div class="pod proc">${gearClusterSVG()}${procExtra}</div>`
    : `<div class="pod proc"><span class="gear">⚙</span></div>`;

  const flowHTML = useGears ? flowChannelHTML() : '';

  const cls = ['factory'];
  if (useGears) cls.push('gearworks');
  if (isPads)   cls.push('pads');
  if (state.paused) cls.push('paused');

  const machineStateAttr = isPads
    ? ` data-machine-state="${state.machineState}" data-off-mode="${state.offMode}"`
    : '';

  // Compute the proc-pod size from the gear layout so the area
  // auto-adjusts to gear count + size. With a single gear at the
  // default size this collapses back to ~46×46, matching the
  // Baseline variant's proc pod.
  let procSizeStyle = '';
  if (useGears) {
    const layout = computeGearLayout();
    const podW = Math.ceil(layout.viewBoxW) + 2;
    const podH = Math.ceil(layout.viewBoxH) + 4;
    procSizeStyle = ` --proc-w:${podW}px; --proc-h:${podH}px; --proc-h-inner:${Math.ceil(layout.viewBoxH)}px;`;
  }

  // Output pod: in pads variant, host the stack column inside it.
  let outputPodHTML;
  if (isPads) {
    const outEmoji = state.output.emoji || '?';
    const stackItems = state.outputStack.map((item, i) =>
      `<span class="stack-item${item.fresh ? ' fresh' : ''}" style="--idx:${i}" data-key="${item.key}">${outEmoji}</span>`
    ).join('');
    const hasStack = state.outputStack.length > 0 ? ' has-stack' : '';
    outputPodHTML = `<div class="pod output${hasStack}">
      <span class="out">${outEmoji}</span>
      <div class="out-stack">${stackItems}</div>
    </div>`;
  } else {
    outputPodHTML = `<div class="pod output"><span class="out">${state.output.emoji}</span></div>`;
  }

  // Bar is hidden for pads variant.
  const barHTML = isPads
    ? ''
    : `<div class="bar"><span style="width:${state.progress}%;"></span></div>`;

  document.getElementById('preview').innerHTML = `
    <div class="${cls.join(' ')}" data-led="${state.led}"${machineStateAttr}
         style="--gear-period:${state.gearPeriod}s; --flow-period:${state.flowPeriod}s;${procSizeStyle}">
      <span class="led"></span>
      <span class="rv-l"></span><span class="rv-r"></span>
      <div class="stations">
        <div class="pod input">${inputRowsHTML}</div>
        <span class="joint"></span>
        ${procHTML}
        <span class="joint"></span>
        ${outputPodHTML}
        ${flowHTML}
      </div>
      ${barHTML}
    </div>`;

  // Wire the input pod click → feed action (pads variant only)
  if (isPads) {
    const inputPod = document.querySelector('.factory.pads .pod.input');
    if (inputPod) {
      inputPod.addEventListener('click', () => {
        feedSelected();
        inputPod.classList.remove('feed-flash');
        // force reflow so the animation restarts
        void inputPod.offsetWidth;
        inputPod.classList.add('feed-flash');
      });
    }
    // After render, items lose their "fresh" flag so the pop only plays once
    requestAnimationFrame(() => {
      state.outputStack.forEach(it => it.fresh = false);
    });
  }

  const labels = { gearworks: 'gear works', pads: 'pads', baseline: 'baseline' };
  document.getElementById('preview-label').textContent =
    labels[state.variant] || 'baseline';
}

// ── Pads variant simulation ──────────────────────────────────

// Drop `amount` of inputs[itemIdx] into the machine. Caps at recipe.
// If the recipe is fully met, kicks off processing.
function feedMachine(itemIdx, amount) {
  if (state.machineState === 'processing') return; // busy
  if (itemIdx < 0 || itemIdx >= state.inputs.length) return;
  const need = state.inputs[itemIdx].count;
  state.fed[itemIdx] = Math.min(need, (state.fed[itemIdx] || 0) + amount);
  // Are all ingredients satisfied?
  const allSatisfied = state.inputs.every((inp, i) => state.fed[i] >= inp.count);
  if (allSatisfied) {
    startProcessing();
  } else {
    state.machineState = deriveMachineState();
  }
  renderCard();
}

function feedSelected() {
  feedMachine(state.dropTool.itemIdx, Math.max(1, state.dropTool.amount | 0));
}

function startProcessing() {
  state.machineState = 'processing';
  state.processProgress = 0;
  // Set LED to draining for visual feedback
  state.led = 'draining';
  syncLedButtons();
}

function completeProcess() {
  // Pop a fresh output onto the stack
  state.outputStack.push({ key: ++state.freshKey, fresh: true });
  // Reset fed for the next batch
  state.fed = state.inputs.map(() => 0);
  state.processProgress = 0;
  // Exit processing FIRST so deriveMachineState can recompute correctly.
  // Without this, deriveMachineState early-returns 'processing' and the
  // machine immediately starts another (empty) batch.
  state.machineState = 'idle';
  state.machineState = deriveMachineState();
  // Brief "done" LED pulse, then back to idle/draining
  state.led = 'done';
  syncLedButtons();
  setTimeout(() => {
    if (state.machineState !== 'processing') {
      state.led = state.machineState === 'idle' ? 'idle' : 'draining';
      syncLedButtons();
    }
  }, 350);
  renderCard();
}

function takeOutput() {
  if (state.outputStack.length === 0) return;
  state.outputStack = [];
  // Don't change machine state — it might still be processing the next batch
  if (state.machineState !== 'processing') {
    state.machineState = deriveMachineState();
  }
  renderCard();
}

function syncLedButtons() {
  document.querySelectorAll('#led-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.led === state.led);
  });
  const card = document.querySelector('.factory');
  if (card) card.dataset.led = state.led;
}

// rAF loop drives the processing timer + the proc-progress ring.
let _lastTickMs = 0;
function tick(nowMs) {
  const dtMs = _lastTickMs ? (nowMs - _lastTickMs) : 0;
  _lastTickMs = nowMs;
  if (state.variant === 'pads' &&
      state.machineState === 'processing' &&
      !state.paused) {
    const dt = dtMs / 1000;
    state.processProgress += dt / Math.max(0.1, state.processTime);
    if (state.processProgress >= 1) {
      state.processProgress = 1;
      completeProcess();
    } else {
      // Update just the ring var without a full re-render
      const ring = document.querySelector('.factory.pads .pod.proc .proc-progress');
      if (ring) ring.style.setProperty('--proc', state.processProgress.toFixed(3));
    }
  }
  requestAnimationFrame(tick);
}

// ── Settings panel ────────────────────────────────────────────

function renderInputList() {
  const list = document.getElementById('input-list');
  list.innerHTML = state.inputs.map((inp, i) => `
    <div class="input-row">
      <input type="text"   class="e-in" data-i="${i}" data-k="emoji" value="${inp.emoji}" maxlength="4">
      <input type="number" class="n-in" data-i="${i}" data-k="count" value="${inp.count}" min="0">
      <button class="del" data-i="${i}" title="remove">×</button>
    </div>
  `).join('');

  list.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => {
      const i = +el.dataset.i;
      const k = el.dataset.k;
      state.inputs[i][k] = k === 'count' ? +el.value : el.value;
      // Editing the recipe resets the in-flight batch
      state.fed = state.inputs.map(() => 0);
      state.machineState = 'idle';
      state.processProgress = 0;
      renderDropToolItems();
      renderCard();
    });
  });
  list.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      state.inputs.splice(i, 1);
      state.fed.splice(i, 1);
      syncFed();
      state.machineState = 'idle';
      state.processProgress = 0;
      renderInputList();
      renderDropToolItems();
      renderCard();
    });
  });
}

// Refresh the drop-tool item dropdown to mirror the current inputs.
function renderDropToolItems() {
  const sel = document.getElementById('drop-item');
  if (!sel) return;
  const prev = state.dropTool.itemIdx;
  sel.innerHTML = state.inputs.map((inp, i) =>
    `<option value="${i}">${inp.emoji}  (need ${inp.count})</option>`
  ).join('');
  const clamped = Math.max(0, Math.min(prev, state.inputs.length - 1));
  state.dropTool.itemIdx = clamped;
  sel.value = String(clamped);
}

function bindSettings() {
  // Variant picker
  document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.variant = btn.dataset.variant;
      renderCard();
    });
  });

  // Inputs
  document.getElementById('add-input').addEventListener('click', () => {
    state.inputs.push({ emoji: '❓', count: 1 });
    state.fed.push(0);
    state.machineState = 'idle';
    state.processProgress = 0;
    renderInputList();
    renderDropToolItems();
    renderCard();
  });

  // Output
  document.getElementById('out-emoji').value = state.output.emoji;
  document.getElementById('out-count').value = state.output.count;
  document.getElementById('out-emoji').addEventListener('input', e => {
    state.output.emoji = e.target.value || '?';
    renderCard();
  });
  document.getElementById('out-count').addEventListener('input', e => {
    state.output.count = +e.target.value;
    renderCard();
  });

  // Progress (live, no re-render)
  const prog = document.getElementById('progress');
  prog.value = state.progress;
  prog.addEventListener('input', e => {
    state.progress = +e.target.value;
    document.getElementById('progress-val').textContent = state.progress + '%';
    const fill = document.querySelector('.factory .bar > span');
    if (fill) fill.style.width = state.progress + '%';
  });

  // Gear period (live via CSS var)
  const gs = document.getElementById('gear-speed');
  gs.value = state.gearPeriod;
  gs.addEventListener('input', e => {
    state.gearPeriod = +e.target.value;
    document.getElementById('gear-val').textContent = state.gearPeriod.toFixed(1) + 's';
    const card = document.querySelector('.factory');
    if (card) card.style.setProperty('--gear-period', state.gearPeriod + 's');
  });

  // Flow period (live via CSS var)
  const fs = document.getElementById('flow-speed');
  fs.value = state.flowPeriod;
  fs.addEventListener('input', e => {
    state.flowPeriod = +e.target.value;
    document.getElementById('flow-val').textContent = state.flowPeriod.toFixed(1) + 's';
    const card = document.querySelector('.factory');
    if (card) card.style.setProperty('--flow-period', state.flowPeriod + 's');
  });

  // Gear count (1 / 2 / 3) — re-renders so the SVG cluster + proc pod
  // size both update. Active markers are re-synced from current state.
  const syncGearCountButtons = () => {
    document.querySelectorAll('#gear-count-toggle button').forEach(b => {
      b.classList.toggle('active', +b.dataset.count === state.gearCount);
    });
  };
  syncGearCountButtons();
  document.getElementById('gear-count-toggle').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.gearCount = +btn.dataset.count;
      syncGearCountButtons();
      renderCard();
    });
  });

  // Gear size — single multiplier shared across all gears. Triggers a
  // re-render because the proc pod width is recomputed from the layout.
  const sizeInp = document.getElementById('gear-size');
  sizeInp.value = state.gearSize;
  document.getElementById('gear-size-val').textContent = state.gearSize.toFixed(2) + '×';
  sizeInp.addEventListener('input', e => {
    state.gearSize = +e.target.value;
    document.getElementById('gear-size-val').textContent = state.gearSize.toFixed(2) + '×';
    renderCard();
  });

  // LED state
  document.getElementById('led-toggle').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#led-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.led = btn.dataset.led;
      const card = document.querySelector('.factory');
      if (card) card.dataset.led = state.led;
    });
  });

  // Process time (pads variant) — seconds per craft cycle
  const procTime = document.getElementById('proc-time');
  procTime.value = state.processTime;
  document.getElementById('proc-time-val').textContent = state.processTime.toFixed(1) + 's';
  procTime.addEventListener('input', e => {
    state.processTime = +e.target.value;
    document.getElementById('proc-time-val').textContent = state.processTime.toFixed(1) + 's';
  });

  // Off-state look (pads) — Frozen vs Idle hum
  document.getElementById('off-mode-toggle').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#off-mode-toggle button')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.offMode = btn.dataset.off;
      const card = document.querySelector('.factory.pads');
      if (card) card.dataset.offMode = state.offMode;
    });
  });

  // Drop tool — selected input + amount per click
  renderDropToolItems();
  const dropItem = document.getElementById('drop-item');
  dropItem.addEventListener('change', e => {
    state.dropTool.itemIdx = +e.target.value;
  });
  const dropAmount = document.getElementById('drop-amount');
  dropAmount.value = state.dropTool.amount;
  dropAmount.addEventListener('input', e => {
    state.dropTool.amount = Math.max(1, +e.target.value | 0);
  });
  document.getElementById('drop-feed').addEventListener('click', () => {
    feedSelected();
    const inputPod = document.querySelector('.factory.pads .pod.input');
    if (inputPod) {
      inputPod.classList.remove('feed-flash');
      void inputPod.offsetWidth;
      inputPod.classList.add('feed-flash');
    }
  });

  // Take output — clears the stacked outputs
  document.getElementById('take-output').addEventListener('click', takeOutput);

  // Animation play/pause
  document.getElementById('anim-toggle').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#anim-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.paused = btn.dataset.anim === 'pause';
      const card = document.querySelector('.factory');
      if (card) card.classList.toggle('paused', state.paused);
    });
  });
}

// ── Boot ──────────────────────────────────────────────────────
syncFed();
renderInputList();
bindSettings();
renderCard();
requestAnimationFrame(tick);
</script>
</body>
</html>
