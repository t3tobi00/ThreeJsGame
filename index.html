<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Defense Tycoon</title>
    <link rel="stylesheet" href="styles/main.css">
    <script>
        // Default visitors to ?prototype so friends don't have to know to add
        // the query string. Preserves explicit ?prototype / ?diorama / ?scene
        // links and any other query params already in the URL.
        (function () {
            var s = location.search;
            if (!/(\?|&)(prototype|diorama|scene)(=|&|$)/.test(s)) {
                var join = s ? s + '&' : '?';
                location.replace(location.pathname + join + 'prototype' + location.hash);
            }
        })();
    </script>
</head>

<body>
    <!-- Game Canvas will be injected by Three.js -->

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        <div id="hud"></div>
        <div id="hero-bar"></div>

        <!-- Joystick will be rendered here -->
        <div id="joystick-container"></div>
    </div>

    <!-- Load Three.js from CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="src/main.js"></script>
</body>

</html>
